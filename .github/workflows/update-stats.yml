name: Update GitHub Stats (Official)
on:
  schedule:
    - cron: '0 3 * * *' # 每天北京时间11点自动更新
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 克隆官方github-readme-stats
        run: git clone https://github.com/anuraghazra/github-readme-stats.git

      - name: 安装依赖
        run: |
          cd github-readme-stats
          npm ci

      - name: 生成统计卡片
        run: |
          cd github-readme-stats
          node -e "
            const { renderStatsCard } = require('./src/renderers/stats-card.js');
            const fs = require('fs');
            const card = renderStatsCard({
              username: 'chinabing',
              show_icons: true,
              theme: 'tokyonight',
              hide: ['contribs', 'reviews', 'discussions_started', 'discussions_answered', 'prs_merged', 'prs_merged_percentage'],
              hide_border: true,
              card_width: 450
            });
            fs.writeFileSync('../stats.svg', card);
          "

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          git commit -m "更新GitHub统计卡片" || exit 0
          git push
